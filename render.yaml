services:
  - type: web
    name: printable-jali-factory
    runtime: docker
    plan: standard
    numInstances: 1
    
    # Environment variables
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: /app/storage/database.sqlite
      - key: CACHE_DRIVER
        value: file
      - key: SESSION_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: database

    # Build configuration
    dockerfilePath: ./Dockerfile
    
    # HealthCheck
    healthCheckPath: /
    
    # Port configuration (Render uses 80 by default for web services)
    # The app will run on port 80 inside the container
